<svg width="800" height="160" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <style>
      .ttl { animation: fi 1.2s ease-out forwards; opacity: 0; }
      .sub { animation: fi 1.2s ease-out 0.4s forwards; opacity: 0; }
      .bar { animation: fi 1.2s ease-out 0.2s forwards; opacity: 0; }
      @keyframes fi { to { opacity: 1; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)"/>

  <!-- Very subtle top edge highlight -->
  <rect width="800" height="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Small accent bar under the name -->
  <rect x="290" y="100" width="220" height="2" rx="1" fill="url(#accent)" opacity="0.7" class="bar"/>

  <!-- Main title -->
  <text x="400" y="88"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="38" font-weight="800"
        fill="white"
        class="ttl">Hi, I&#39;m Sofia Arenas &#128075;</text>

  <!-- Subtitle -->
  <text x="400" y="125"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="14" font-weight="400"
        fill="rgba(200,200,220,0.7)"
        class="sub">Software Developer &#183; Building AI that creates real impact</text>

  <!-- Subtle bottom wave -->
  <path d="M0,148 C200,136 400,155 600,144 C700,138 760,150 800,146 L800,160 L0,160 Z"
        fill="rgba(167,139,250,0.06)"/>
</svg>
